apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: aws-pool
  namespace: metallb-system
spec:
  addresses:
  - 172.18.255.200-172.18.255.220
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: aws-12-adv
  namespace: metallb-system
spec:
  ipAddressPools:
  - aws-pool


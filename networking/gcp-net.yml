apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: gcp-pool
  namespace: metallb-system
spec:
  addresses:
  - 172.18.255.230-172.18.255.250
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: gcp-l2-adv
  namespace: metallb-system
spec:
  ipAddressPools:
  - gcp-pool
